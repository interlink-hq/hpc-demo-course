# VirtualKubelet configuration for Interlink
nodeName: interlink-node

# Interlink API configuration  
interlink:
  url: "http://192.168.2.170"
  port: "3000"

# VirtualKubelet binary source
vk:
  # We use a lightweight distroless image as base and inject the binary
  image:
    repository: alpine
    tag: "3.18"
  
  # VirtualKubelet binary settings
  binary:
    # Can be "download" or "local"
    source: "local"
    # Path to local binary if source is "local"
    localPath: "/home/rocky/vk"
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# RBAC
serviceAccount:
  create: true
  name: virtual-kubelet

# Namespace
namespace: default
